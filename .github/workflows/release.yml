# neurokeeper - PyPI release via Trusted Publishing (OIDC, no stored tokens).
# Runs on a published GitHub Release. Requires a configured PyPI Trusted Publisher for this repo
# (PyPI project settings) so the OIDC handshake can mint a short-lived upload token.
name: release
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: build + publish to PyPI
    # GATED: runs only once a PyPI Trusted Publisher is configured for this repo AND the repo variable
    # PYPI_ENABLE=true is set (Settings > Secrets and variables > Actions > Variables). Until then it is
    # SKIPPED, so cutting a GitHub Release stays green. See RELEASING.md.
    if: ${{ vars.PYPI_ENABLE == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC -> PyPI Trusted Publishing (no API token)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with: { python-version: '3.13' }
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
