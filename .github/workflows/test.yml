# claude-harness -- GitHub Actions CI.
# Fast engine tests run on every push/PR (no system installs). The heavy bootstrap
# matrix (apt/brew/winget-installs whole toolchains) is GATED to manual dispatch,
# releases, and a weekly schedule -- it doesn't need to run on every commit.
name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: "0 6 * * 1"   # Mon 06:00 UTC -- exercise the heavy bootstrap matrix weekly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- fast: the engines (every push/PR, all 3 OS, python floor matrix) ----
  engine-tests:
    name: engines (${{ matrix.os }} py${{ matrix.py }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.py }}
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  # ---- lint ----
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with: { python-version: '3.13' }
      - run: pip install ruff
      - run: ruff check scripts/ tests/ claude_harness/

  # ---- secret scan (gitleaks DEFAULT rules; blocking). Pinned + checksum-verified ----
  secrets:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with: { fetch-depth: 0 }
      - name: gitleaks (pinned version, checksum-verified)
        run: |
          set -euo pipefail
          VER=8.28.0
          SHA=a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          echo "${SHA}  gl.tgz" | sha256sum -c -
          tar -xzf gl.tgz gitleaks
          # DEFAULT rules only (secret-only -- API keys/tokens/private keys). Safe to publish.
          ./gitleaks detect --source . --redact --no-banner --exit-code 1

  # ---- release manifests: version-sync + plugin/marketplace sanity (offline, stdlib-only) ----
  release-gate:
    name: release manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with: { python-version: '3.13' }
      - run: python scripts/check-release.py

  # ---- heavy: real bootstrap install test. GATED (not on every push) ----
  bootstrap-test:
    name: bootstrap (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Run bootstrap test (bash)
        if: runner.os != 'Windows'
        shell: bash
        run: bash bootstrap/test/test-bootstrap.sh
      - name: Run bootstrap test (pwsh)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -NoProfile -File bootstrap/test/test-bootstrap.ps1
