# neurokeeper pre-commit hooks. Consume from another (vault) repo's .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/Wombat164/neurokeeper
#       rev: v0.3.0
#       hooks:
#         - id: neurokeeper-doctor          # aggregate health gate (recommended)
#         # - id: neurokeeper-ref-audit     # or just reference integrity
#
# pre-commit builds an isolated venv and installs this package, so the `neurokeeper` CLI is the entry.
# The engines scan VAULT_ROOT (defaults to the repo root). doctor SKIPS engines whose config is absent
# (no FRONTMATTER_SCHEMA / CLAUDE_MEMORY_DIR) -- it never false-fails on unconfigured checks. Pair with
# lychee / markdownlint / check-jsonschema for the commoditized checks this deliberately does NOT do.
- id: neurokeeper-doctor
  name: neurokeeper doctor (vault health gate)
  description: Aggregate read-only health; fails on broken .canvas/.base refs or an engine error (honest tri-state).
  entry: neurokeeper doctor --check
  language: python
  pass_filenames: false
  always_run: true
- id: neurokeeper-ref-audit
  name: neurokeeper ref-audit (reference integrity)
  description: Reference-integrity gate; broken .canvas/.base fail, unresolved wikilinks informational (add --strict to fail).
  entry: neurokeeper ref-audit --check
  language: python
  pass_filenames: false
  always_run: true
