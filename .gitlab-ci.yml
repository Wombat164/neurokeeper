# neurokeeper -- GitLab CI.
# Fast engine tests + lint run on every push. The heavy bootstrap test (installs
# system packages -> disposable container only) is GATED to scheduled/manual runs.

stages:
  - test
  - bootstrap

# ---- fast: the engines (every push) ----
engine-tests:
  stage: test
  image: python:3.13-slim
  before_script:
    - pip install --quiet -r requirements-dev.txt
  script:
    - python -m pytest tests/ -q

# ---- lint ----
ruff:
  stage: test
  image: python:3.13-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check scripts/ tests/ neurokeeper/

# ---- secret scan (gitleaks DEFAULT rules; blocking). Pinned + checksum-verified ----
gitleaks:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl tar coreutils
  script:
    - VER=8.28.0
    - SHA=a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb
    - curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
    - echo "${SHA}  gl.tgz" | sha256sum -c -
    - tar -xzf gl.tgz gitleaks
    # DEFAULT rules only (secret-only -- API keys/tokens/private keys). Safe to publish.
    - ./gitleaks detect --source . --redact --no-banner --exit-code 1

# ---- heavy: real bootstrap install (clean ubuntu). Scheduled or manual only ----
bootstrap:linux:
  stage: bootstrap
  image: ubuntu:24.04
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: manual
      allow_failure: true
  before_script:
    - apt-get update
    - apt-get install -y sudo curl ca-certificates git
  script:
    - bash bootstrap/test/test-bootstrap.sh

